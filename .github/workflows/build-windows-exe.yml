name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller docker

      - name: Build EXE with PyInstaller
        working-directory: app_escritorio
        run: |
          pyinstaller --clean --noconfirm wordpress_utilidades_app.spec

      - name: Read version from version.json
        id: version
        shell: pwsh
        run: |
          $data = Get-Content app_escritorio/version.json -Raw | ConvertFrom-Json
          $raw = [string]$data.version
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "version.json no contiene campo version valido"
          }
          $tag = "v$($raw.TrimStart('v'))"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Tag detectado: $tag"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wordpress_Utilidades_${{ github.ref_name }}
          path: app_escritorio/dist/Wordpress_Utilidades.exe
          if-no-files-found: error

      - name: Publish EXE to GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: app_escritorio/dist/Wordpress_Utilidades.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
